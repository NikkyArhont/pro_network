name: pro_network
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  cloud_firestore: ^6.2.0
  firebase_auth: ^6.3.0
  firebase_core: ^4.6.0
  firebase_storage: 13.2.0
  flutter:
    sdk: flutter
  image_picker: ^1.2.1
  camera: ^0.11.0+1
  pinput: ^6.0.2
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.1
  intl: ^0.19.0
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/icon.png"
  min_sdk_android: 21 # android min sdk min:21 or higher

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
